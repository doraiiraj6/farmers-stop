<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart – Farmers Stop</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<header class="navbar">
  <div class="nav-left">
    <a href="index.html" class="logo"><span class="logo-icon">🌿</span><span class="logo-text">Farmers<span class="logo-accent">Stop</span></span></a>
  </div>
  <div class="nav-right">
    <a href="products.html" class="nav-link"><i class="fa fa-arrow-left"></i> Continue Shopping</a>
    <a href="cart.html" class="nav-link cart-link"><i class="fa fa-shopping-basket"></i> <span class="cart-count" id="cartCount">0</span></a>
  </div>
</header>

<div class="cart-page">
  <h1>🛒 Your Cart</h1>

  <div id="emptyCart" style="display:none;text-align:center;padding:60px 20px;">
    <div style="font-size:5rem;margin-bottom:20px">🧺</div>
    <h2 style="color:var(--mud);font-family:'Playfair Display',serif;">Your cart is empty</h2>
    <p style="color:var(--text-light);margin:12px 0 24px;">Looks like you haven't added any fresh produce yet!</p>
    <a href="products.html" class="btn-primary">🌿 Shop Now</a>
  </div>

  <div class="cart-layout" id="cartContent">
    <div class="cart-items" id="cartItemsList"></div>

    <div class="cart-summary">
      <h3>Order Summary</h3>
      <div class="summary-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
      <div class="summary-row"><span>Delivery</span><span id="delivery">₹40</span></div>
      <div class="summary-row"><span>Discount</span><span id="discount" style="color:var(--leaf)">-₹0</span></div>
      <div class="summary-row total"><span>Total</span><span id="totalPrice">₹0</span></div>

      <div style="background:var(--cream);border-radius:8px;padding:12px;margin-top:14px;font-size:0.85rem;">
        <input type="text" id="couponInput" placeholder="Enter promo code" style="border:1px solid var(--border);padding:8px 12px;border-radius:6px;width:100%;margin-bottom:8px;font-family:'Nunito',sans-serif;outline:none;"/>
        <button onclick="applyCoupon()" style="width:100%;padding:8px;background:var(--soil);color:var(--mud);border:none;border-radius:6px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;">Apply Coupon</button>
      </div>

      <button class="checkout-btn" onclick="location.href='payment.html'">
        Proceed to Checkout 🌾
      </button>

      <div style="font-size:0.78rem;color:var(--text-light);text-align:center;margin-top:12px;">
        🔒 Safe & Secure Checkout
      </div>
    </div>
  </div>

  <!-- SUGGEST FROM CART -->
  <div id="cartSuggest" style="margin-top:40px;display:none">
    <h2 class="section-title">🌱 Often Bought Together</h2>
    <div class="products-grid" id="cartSuggestGrid"></div>
  </div>
</div>

<div class="toast"></div>

<script src="js/data.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  updateCartCount();
  renderCart();
});

function renderCart() {
  const cart = getCart();
  const empty = document.getElementById('emptyCart');
  const content = document.getElementById('cartContent');

  if (!cart.length) {
    empty.style.display = 'block';
    content.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  content.style.display = 'flex';

  const list = document.getElementById('cartItemsList');
  list.innerHTML = cart.map(item => `
    <div class="cart-item" id="item-${item.id}">
      <div class="cart-item-img">${item.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div style="font-size:0.8rem;color:var(--text-light)">🌾 ${item.farm}</div>
        <div class="cart-item-price">₹${item.price}/${item.unit}</div>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeCartQty(${item.id}, -1)">−</button>
          <span class="qty-num" id="qty-${item.id}">${item.qty}</span>
          <button class="qty-btn" onclick="changeCartQty(${item.id}, 1)">+</button>
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-weight:700;color:var(--mud);font-size:1.1rem">₹${item.price * item.qty}</div>
        <button class="remove-btn" onclick="removeItem(${item.id})"><i class="fa fa-trash"></i></button>
      </div>
    </div>
  `).join('');

  updateSummary();
  renderCartSuggestions(cart);
}

function changeCartQty(id, delta) {
  const cart = getCart();
  const item = cart.find(i => i.id === id);
  if (!item) return;
  item.qty = Math.max(1, item.qty + delta);
  saveCart(cart);
  renderCart();
}

function removeItem(id) {
  let cart = getCart();
  cart = cart.filter(i => i.id !== id);
  saveCart(cart);
  renderCart();
  showToast('🗑️ Item removed from cart');
}

function updateSummary() {
  const cart = getCart();
  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const delivery = subtotal >= 299 ? 0 : 40;
  const total = subtotal + delivery;
  document.getElementById('subtotal').textContent = `₹${subtotal}`;
  document.getElementById('delivery').textContent = delivery === 0 ? 'FREE 🎉' : `₹${delivery}`;
  document.getElementById('totalPrice').textContent = `₹${total}`;
  localStorage.setItem('fs_order_total', total);
}

function applyCoupon() {
  const code = document.getElementById('couponInput').value.trim().toUpperCase();
  if (code === 'FRESH10') {
    document.getElementById('discount').textContent = '-₹10';
    showToast('🎉 Coupon FRESH10 applied! ₹10 off');
  } else if (code === 'FARM20') {
    document.getElementById('discount').textContent = '-₹20';
    showToast('🎉 Coupon FARM20 applied! ₹20 off');
  } else {
    showToast('❌ Invalid coupon code');
  }
}

function renderCartSuggestions(cart) {
  if (!cart.length) return;
  const cats = [...new Set(cart.map(i => i.cat))];
  const ids = cart.map(i => i.id);
  const sugg = PRODUCTS.filter(p => cats.includes(p.cat) && !ids.includes(p.id)).slice(0, 4);
  if (sugg.length) {
    document.getElementById('cartSuggest').style.display = 'block';
    document.getElementById('cartSuggestGrid').innerHTML = sugg.map(renderProductCard).join('');
  }
}
</script>
</body>
</html>
